<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <title>First Grid App</title>
</head>
<body>

    <div class="header-container mt-1 mb-1 ml-1 mr-1">

        <svg width="50" height="50" viewBox="0 0 100 100">
            <rect width="100" height="100" fill="#007bff"/>
        </svg>
        <h1 class="app-title">First Grid App</h1>
    </div>


    <div class="input-section row">
        <div class="col-md-6 mb-3">
            <input type="text" class="form-control" id="name" name="name" placeholder="Name">
        </div>
        <div class="col-md-6 mb-3">
            <input type="text" class="form-control" id="role" name="role" placeholder="Role">
        </div>
        <div class="col-12 mb-3">
            <button id="APIbutton" class="btn btn-primary">API test</button>
        </div>
    </div>


    <div id="grid-container" class="grid-container ml-1 mr-1">

        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>

    </div>


    <div class="col-5 mb-1 mt-3">
        <textarea name="msg" id="error" class="form-control" rows="4" placeholder="Error messages...";></textarea>
    </div>


    <script src="js/axios.min.js"></script>
    <script src="js/script.js"></script>


</body>
</html>
